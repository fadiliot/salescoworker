databases:
  - name: sales_coworker_db
    databaseName: salesdb
    user: postgres
    plan: free

services:
  - type: web
    name: sales-coworker-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sales_coworker_db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
